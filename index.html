    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Rexran",
      "url": "https://rexran.com/",
      "logo": "https://rexran.com/icon-512.png",

      "sameAs": ["https://instagram.com/rexran.media"],
      "priceRange": "$12-$549",
      "areaServed": "Worldwide",
      "makesOffer": [
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "UGC Video Ad" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cinematic Film" } },
        { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Static Ad Image" } },

      ]
    }

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "How fast is delivery, really?", "acceptedAnswer": { "@type": "Answer", "text": "Most orders land in 48 hours from the moment we have your brief. Turnaround is an estimate in business days and can shift slightly with scope or revisions — but speed is the whole point of Rexran." } },
        { "@type": "Question", "name": "What do I need to send to get started?", "acceptedAnswer": { "@type": "Answer", "text": "Just your product link, a few photos, and a short brief on what to highlight. Pick your package and sizes at checkout — that's the whole intake." } },
        { "@type": "Question", "name": "Is this actually AI-generated, or does a human make it?", "acceptedAnswer": { "@type": "Answer", "text": "AI is the camera and crew; the direction is human. Every script, cast, shot, and grade is directed by hand so the result reads like a brand, not a prompt." } },
        { "@type": "Question", "name": "Can I choose the aspect ratio and format?", "acceptedAnswer": { "@type": "Answer", "text": "Yes — pick the sizes you need per asset (9:16, 1:1, 16:9, and more) right in the order builder, so every file arrives ready for the exact placement you're running." } },
        { "@type": "Question", "name": "What if I need changes after delivery?", "acceptedAnswer": { "@type": "Answer", "text": "Reasonable revisions within your original brief are included. A new concept, extra assets, or a different product is treated as a new order." } },
        { "@type": "Question", "name": "Is payment secure? Do you store my card?", "acceptedAnswer": { "@type": "Answer", "text": "Checkout runs entirely on Stripe's secure page — your card details never touch our servers." } },
        { "@type": "Question", "name": "What's your refund policy?", "acceptedAnswer": { "@type": "Answer", "text": "Because every asset is custom-produced for you, orders are generally non-refundable once production begins. If something's gone wrong, email us and we'll work in good faith to make it right." } },
        { "@type": "Question", "name": "Who owns the final files?", "acceptedAnswer": { "@type": "Answer", "text": "You do. Once your order is paid in full, the rights to use the delivered creative for your own advertising are yours." } }
      ]
    }
    </script>
